name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja zaleznosci
        run: pip install -r requirements-dev.txt

      - name: Uruchomienie lintera
        run: bash scripts/lint.sh

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja zaleznosci
        run: pip install -r requirements-dev.txt

      - name: Uruchomienie testow
        run: python -m pytest app/tests -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja zaleznosci
        run: pip install -r requirements.txt

      - name: Weryfikacja importu aplikacji
        run: python -c "from app.main import app; print('OK')"