services:

  app:
    build: .
    environment:
      DB_PATH: /data/app.db
    volumes:
      - app-data:/data
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:8000/health" ]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  app-data: